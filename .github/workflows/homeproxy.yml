name: Make HomeProxy run files

on:
  workflow_dispatch:

jobs:
  make-run:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 📦 安装 makeself 工具
        run: sudo apt-get update && sudo apt-get install -y makeself curl

      - name: 🚀 下载 homeproxy的所有ipk
        run: |
          chmod +x shell/homeproxy.sh
          ./shell/homeproxy.sh

      - name: 📋 拷贝 install.sh 到各平台目录
        run: |
          cp shell/install.sh x86_64/install.sh
          cp shell/install.sh aarch64_generic/install.sh
          chmod +x x86_64/install.sh aarch64_generic/install.sh

      - name: 🔍 提取版本号并打包
        id: pack
        run: |
          mkdir -p output

          # 获取版本
          APP_IPK=$(ls aarch64_generic/luci-app-homeproxy_*.ipk | head -n 1)
          VERSION=$(basename "$APP_IPK" | sed -n 's/^luci-app-homeproxy_\(.*\)_all\.ipk$/\1/p')

          if [ -z "$VERSION" ]; then
            echo "❌ 无法提取版本号"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "打印版本号"
          echo $VERSION

          # 打包两个平台
          for PLATFORM in x86_64 aarch64_generic; do
            makeself --notemp "$PLATFORM" "output/luci-app-homeproxy-${VERSION}_${PLATFORM}.run" \
              "homeproxy ${PLATFORM} Installer v${VERSION}" ./install.sh
          done

      - name: Set version name without special chars
        id: clean_version
        run: |
            version="${{ steps.pack.outputs.version }}"
            version=${version%%~*}
            echo "VERSION_CLEAN=$version" >> $GITHUB_ENV
            echo "cleaned_version=$version" >> $GITHUB_OUTPUT

      - name: Fetch latest release details
        id: fetch_release_details
        run: |
          version=${{ steps.clean_version.outputs.cleaned_version }}
          extra_content="![GitHub Downloads (all assets, specific tag)](https://img.shields.io/github/downloads/wukongdaily/RunFilesBuilder/homeproxy-$version/total?style=for-the-badge&labelColor=135ace&color=yellow)"
          sed -i "1i $extra_content" info/homeproxy.md


      - name: 📤 上传 .run 文件到 release
        uses: ncipollo/release-action@v1
        with:
          tag: "homeproxy-${{ steps.clean_version.outputs.cleaned_version }}"
          commit: ${{ github.sha }}
          allowUpdates: true
          name: "homeproxy-${{ steps.clean_version.outputs.cleaned_version }}"
          bodyFile: ${{ github.workspace }}/info/homeproxy.md
          artifacts: output/*.run
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
